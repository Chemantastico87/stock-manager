name: Build APK with Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build APK with Flet Docker image
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/app \
          -w /app \
          ghcr.io/flet-dev/flet:latest \
          bash -c "pip install --upgrade pip && pip install flet && flet build apk"
          
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: stock-app
        path: |
          build/apk/*.apk
          **/*.apk
