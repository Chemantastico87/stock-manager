name: Build APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        
    - name: Install Buildozer
      run: |
        pip install buildozer
        pip install cython
        
    - name: Create buildozer spec
      run: |
        buildozer init
        sed -i 's/title = .*/title = Stock Manager/' buildozer.spec
        sed -i 's/package.name = .*/package.name = stockmanager/' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = com.stock/' buildozer.spec
        sed -i 's/source.dir = .*/source.dir = ./' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec
        
    - name: Build APK
      run: |
        buildozer android debug deploy run
      timeout-minutes: 45
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: stock-manager-apk
        path: bin/*.apk
